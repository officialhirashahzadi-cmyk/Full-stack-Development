<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordered List Tag</title>
</head>

<body>
    <!-- Ordered List Tag -->
    <p>This is an Ordered list </p>
    <ol>
        <li>Coffe</li>
        <li>Ice Creame </li>
        <li>Tea</li>
    </ol>
    <!-- for specific order uisng ( type="_" ) attribute  -->
    <p>This is an Ordered list with different style </p>
    <ol type="a">
        <li>Coffe</li>
        <li>Ice Creame </li>
        <li>Tea</li>
    </ol>
<!-- for caiptal order -->
    <ol type="A">
        <li>Coffe</li>
        <li>Ice Creame </li>
        <li>Tea</li>
    </ol>
<!-- use ( start="" ) for specific number -->
    <ol start="10">
        <li>Coffe</li>
        <li>Ice Creame </li>
        <li>Tea</li>
    </ol>
<!-- reversed order -->
    <ol reversed="9">
        <li>Coffe</li>
        <li>Ice Creame </li>
        <li>Tea</li>
    </ol>
</body>

</html>
