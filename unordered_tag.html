<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unordered Tag</title>
</head>

<body>
    <!--  unordered list : buluts -->
    <p>This is Unordered List.</p>
    <ul>
        <li>Coffe</li>
        <li>Ice Creame </li>
        <li>Tea</li>

    </ul>

    <!-- we can also add formating within list tag! -->

    <p>this is an unordered list with formating</p>
    <ul>
        <li><strong>Coffe</strong></li>
        <li><em>Ice Creame</em> </li>
        <li><ins>Tea</ins></li>

    </ul>
</body>

</html>
