<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form-file-1</title>
</head>

<body>
    <!--  Forms  -->
    <form>
        <!-- type -->
        <p> Username : <input type="text"></p>

        <p> Roll no : <input type="number"></p>


        <p> Password : <input type="password"></p>

        <p> Email : <input type="email"></p>
        <!-- placeholder -->
        <hr>
        <p> Username : <input type="text" placeholder="Enter your name  "></p>

        <p> Roll no : <input type="number" placeholder="Enter your roll no"></p>

        <p> Password : <input type="password" placeholder="Enter your password "></p>

        <p> Email : <input type="email" placeholder="Enter your email "></p>
        <!-- type = checkbox -->
         <h3>Stay login</h3>
        <p><input type="checkbox">not yet</p>
        <p><input type="checkbox">already</p>
        <p><input type="checkbox">not interested</p>

        <!-- type = radio -->
          <h3>Gender</h3>
        <p><input type="Radio">male</p>
        <p><input type="Radio">female</p>
        <p><input type="Radio">other</p>

    </form>
    <!-- with name attribute -->
    <form action="">
          <h3>Gender</h3>
        <p><input type="Radio"  name="f1">male</p>
        <p><input type="Radio"  name="f1">female</p>
        <p><input type="Radio"  name="f1">other</p>
    </form>
</body>

</html>
