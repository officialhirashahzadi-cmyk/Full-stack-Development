<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFrames</title>
</head>

<body>
    <!-- add through absolute link -->
    <p> <iframe src="first_ website.html"></iframe></p>
    <!-- add through relative link -->
    <p> <iframe src="https://www.ecowebhosting.co.uk" width="300px"></iframe></p>
    <!-- iframe ka through youtube videos ko webpage ma impote kar sakty han  -->
    <!-- step 1 : open youtube & select video
      step 2 : click on share button 
      step 3: click on Embed  & copy link as it is 
      step 4 : paste it here  <iframe src=""></iframe>-->
    <p> <iframe width="560" height="315" src="https://www.youtube.com/embed/WmVLcj-XKnM?si=g5yzcHhb51ya0tMt"
            title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></p>




</body>

</html>
